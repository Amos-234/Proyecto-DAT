<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Telecom</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="./css/styles.css">
    </head>

    <body> 
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <!--icono de la empresa (cuando se clicka encima, tiene que llevar al inicio de la página (arriba))-->
                <a href="#home" class="navbar-brand">
                    <img src="./assets/img/telecom_ico.png" class="icono_Telecom">
                </a>

                <!--barra de búsqueda-->
                <form class="d-flex flex-grow-1 mx-lg-4 my-2 my-lg-0" style="max-width: 600px;" onsubmit="realizarBusqueda(event)">
                    <div class="input-group input-group-lg rounded-pill border overflow-hidden shadow-sm">
                        <input type="text" id="inputBusqueda" class="form-control border-0 shadow-none px-4" placeholder="¿Qué buscas?">
                        <button class="btn bg-white border-0 text-secondary px-4 hover-bg-light" type="submit">
                        <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
                
                <div class="navbar-nav">
                    <!--catálogo-->
                    <a href="#catalogo" class="nav-link">
                        <i class="bi bi-list"></i>
                        Catálogo
                    </a>

                    <!--icono de login-->
                    <a href="#login" class="nav-link">
                        <i class="bi bi-person-circle"></i>
                        Login
                    </a>

                    <!--carrito de la compra-->
                    <a href="#carrito" class="nav-link">
                        <i class="bi bi-cart"></i>
                        Carrito
                    </a>
                </div>
            </div>
        </nav>
        

        <main>
            <section id="home"></section>
            <section id="catalogo"></section>
            <section id="producto"></section>
            <section id="carrito"></section>
            <section id="login"></section>
            <section id="cuenta"></section>
            <section id="admin"></section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="./app.js"></script>
    </body>
</html>
