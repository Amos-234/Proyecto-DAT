<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Telecom</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="./css/styles.css">
    </head>

    <body> 
        <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
            <div class="container">
                <a href="#home" class="navbar-brand">
                    <img src="./assets/img/telecom_ico.png" class="icono_Telecom" alt="Telecom Logo" style="height: 40px;">
                </a>

                <div class="position-relative flex-grow-1 mx-lg-4 my-2 my-lg-0" style="max-width: 600px;" id="contenedorBusqueda">
                    <form class="d-flex w-100" onsubmit="realizarBusqueda(event)">
                        <div class="input-group input-group-lg rounded-pill border shadow-sm bg-white">
                            <input type="text" id="inputBusqueda" class="form-control border-0 shadow-none px-4 rounded-pill" 
                                placeholder="¿Qué buscas?" autocomplete="off" oninput="mostrarSugerencias(this.value)">
                            <button class="btn bg-white border-0 text-secondary px-4 rounded-pill" type="submit">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </form>
                    
                    <div id="cajaSugerencias" class="position-absolute w-100 bg-white border rounded shadow-lg mt-1 d-none" 
                        style="z-index: 1050; max-height: 350px; overflow-y: auto;">
                    </div>
                </div>
                
                <div class="navbar-nav">
                    <a href="#catalogo" class="nav-link fw-semibold mx-2">
                        <i class="bi bi-list"></i> Catálogo
                    </a>
                    <a href="#login" class="nav-link fw-semibold mx-2">
                        <i class="bi bi-person-circle"></i> Login
                    </a>
                    <a href="#carrito" class="nav-link fw-semibold mx-2">
                        <i class="bi bi-cart"></i> Carrito
                    </a>
                </div>
            </div>
        </nav>
        
        <main>
            <section id="home">
                <div class="container py-4">
                    
                    <div class="mb-5">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h4 fw-bold mb-0">Productos Destacados</h2>
                            <a href="#catalogo" class="text-primary small text-decoration-none fw-semibold">Ver todos →</a>
                        </div>
                        <div class="position-relative px-3">
                            <button class="btn btn-light border shadow-sm rounded-circle position-absolute start-0 top-50 translate-middle-y" onclick="document.getElementById('trackDestacados').scrollBy({left: -300, behavior: 'smooth'})" style="width:40px;height:40px;z-index:10">‹</button>
                            <div class="d-flex gap-3 py-2" id="trackDestacados" style="overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;">
                                </div>
                            <button class="btn btn-light border shadow-sm rounded-circle position-absolute end-0 top-50 translate-middle-y" onclick="document.getElementById('trackDestacados').scrollBy({left: 300, behavior: 'smooth'})" style="width:40px;height:40px;z-index:10">›</button>
                        </div>
                    </div>

                    <div class="mb-5">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h4 fw-bold mb-0">Últimas Novedades</h2>
                        </div>
                        <div class="position-relative px-3">
                            <button class="btn btn-light border shadow-sm rounded-circle position-absolute start-0 top-50 translate-middle-y" onclick="document.getElementById('trackNovedades').scrollBy({left: -300, behavior: 'smooth'})" style="width:40px;height:40px;z-index:10">‹</button>
                            <div class="d-flex gap-3 py-2" id="trackNovedades" style="overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;">
                                </div>
                            <button class="btn btn-light border shadow-sm rounded-circle position-absolute end-0 top-50 translate-middle-y" onclick="document.getElementById('trackNovedades').scrollBy({left: 300, behavior: 'smooth'})" style="width:40px;height:40px;z-index:10">›</button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h4 fw-bold text-danger mb-0"><i class="bi bi-tags-fill me-2"></i>Ofertas Especiales</h2>
                        </div>
                        <div class="position-relative px-3">
                            <button class="btn btn-light border shadow-sm rounded-circle position-absolute start-0 top-50 translate-middle-y" onclick="document.getElementById('trackOfertas').scrollBy({left: -300, behavior: 'smooth'})" style="width:40px;height:40px;z-index:10">‹</button>
                            <div class="d-flex gap-3 py-2" id="trackOfertas" style="overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none;">
                                </div>
                            <button class="btn btn-light border shadow-sm rounded-circle position-absolute end-0 top-50 translate-middle-y" onclick="document.getElementById('trackOfertas').scrollBy({left: 300, behavior: 'smooth'})" style="width:40px;height:40px;z-index:10">›</button>
                        </div>
                    </div>

                </div>
                <style>
                    /* Oculta la barra de scroll inferior en el carrusel para un diseño más limpio */
                    #trackDestacados::-webkit-scrollbar, #trackNovedades::-webkit-scrollbar, #trackOfertas::-webkit-scrollbar { display: none; }
                </style>
            </section>

            <section id="catalogo"></section>
            <section id="producto"></section>
            <section id="carrito"></section>
            <section id="login"></section>
            <section id="cuenta"></section>
            <section id="admin"></section>
        </main>

        <footer id="footer-principal" class="bg-dark text-white-50 pt-5 pb-4 mt-5 border-top border-secondary"></footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="./app.js"></script>

    </body>

    
</html>
