<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Telecom</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="./css/styles.css">
    </head>

    <body> 
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <!--icono de la empresa (cuando se clicka encima, tiene que llevar al inicio de la página (arriba))-->
                <div class="navbar-brand">
                    <img src="./assets/img/telecom_ico.png" class="icono_Telecom">
                </div>

                <!--barra de búsqueda-->
                <div>
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="¿Qué buscas?">
                </div>
                
                <div class="navbar-nav">
                    <!--catálogo-->
                    <a href="#catalogo" class="nav-link">
                        <i class="bi bi-list"></i>
                        Catálogo
                    </a>

                    <!--icono de login-->
                    <a href="#login" class="nav-link">
                        <i class="bi bi-person-circle"></i>
                        Login
                    </a>

                    <!--carrito de la compra-->
                    <a href="#carrito" class="nav-link">
                        <i class="bi bi-cart"></i>
                        Carrito
                    </a>
                </div>
            </div>
        </nav>
        

        <main>
            <section id="home">
                <div class="container py-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h5 fw-semibold mb-0">Productos destacados</h2>
                    <a href="#catalogo" class="text-secondary small text-decoration-none">Ver catálogo completo →</a>
                    </div>
                    <div class="position-relative px-4">
                    <button class="btn btn-sm btn-outline-secondary rounded-circle position-absolute start-0 top-50 translate-middle-y" id="btnCarouselLeft" style="width:36px;height:36px;z-index:10">‹</button>
                    <div style="overflow:hidden" id="carouselWrapper">
                        <div class="d-flex gap-3" id="carouselTrack" style="transition: transform 0.4s ease;"></div>
                    </div>
                    <button class="btn btn-sm btn-outline-secondary rounded-circle position-absolute end-0 top-50 translate-middle-y" id="btnCarouselRight" style="width:36px;height:36px;z-index:10">›</button>
                    </div>
                    <div class="d-flex justify-content-center gap-2 mt-3" id="carouselDots"></div>
                </div>
            </section>


            <section id="catalogo"></section>
            <section id="producto"></section>
            <section id="carrito"></section>
            <section id="login"></section>
            <section id="cuenta"></section>
            <section id="admin"></section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="./app.js"></script>
    </body>
</html>
